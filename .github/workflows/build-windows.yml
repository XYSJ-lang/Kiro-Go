name: Build Windows Desktop Installer

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ./web
        run: |
          npm ci
          npm run build

      - name: Build Windows binary
        run: |
          go build -o build/kiro-go.exe ./...

      - name: Create distribution folder
        run: |
          mkdir -p dist
          cp build/kiro-go.exe dist/
          cp -r web/dist dist/web
          cp start.bat dist/
          cp start.ps1 dist/
          cp README.md dist/
          cp README_CN.md dist/
          cp LICENSE dist/

      - name: Create NSIS installer script
        run: |
          @'
          !include "MUI2.nsh"

          Name "Kiro-Go"
          OutFile "Kiro-Go-Setup.exe"
          InstallDir "$PROGRAMFILES64\Kiro-Go"
          InstallDirRegKey HKLM "Software\Kiro-Go" "Install_Dir"
          RequestExecutionLevel admin

          !define MUI_ABORTWARNING

          !insertmacro MUI_PAGE_LICENSE "LICENSE"
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES

          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES

          !insertmacro MUI_LANGUAGE "English"
          !insertmacro MUI_LANGUAGE "SimpChinese"

          Section "Kiro-Go" SecKiroGo
            SetOutPath "$INSTDIR"

            File /r "dist\*"

            CreateDirectory "$SMPROGRAMS\Kiro-Go"
            CreateShortCut "$SMPROGRAMS\Kiro-Go\Kiro-Go.lnk" "$INSTDIR\kiro-go.exe"
            CreateShortCut "$SMPROGRAMS\Kiro-Go\Start Server.lnk" "$INSTDIR\start.bat"
            CreateShortCut "$DESKTOP\Kiro-Go.lnk" "$INSTDIR\kiro-go.exe"

            WriteRegStr HKLM "Software\Kiro-Go" "Install_Dir" "$INSTDIR"

            WriteUninstaller "$INSTDIR\Uninstall.exe"
          SectionEnd

          Section "Uninstall"
            Delete "$INSTDIR\*.*"
            Delete "$INSTDIR\web\*.*"
            RMDir "$INSTDIR\web"
            RMDir "$INSTDIR"

            Delete "$SMPROGRAMS\Kiro-Go\*.*"
            RMDir "$SMPROGRAMS\Kiro-Go"
            Delete "$DESKTOP\Kiro-Go.lnk"

            DeleteRegKey HKLM "Software\Kiro-Go"
          SectionEnd
          '@ | Out-File -Encoding UTF8 installer.nsi

      - name: Install NSIS
        run: |
          choco install nsis -y

      - name: Build NSIS installer
        run: |
          makensis installer.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kiro-Go-Windows-Installer
          path: Kiro-Go-Setup.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: Kiro-Go-Windows-Installer
          path: ./installer

      - name: Get version
        id: version
        run: |
          echo "version=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Kiro-Go v${{ steps.version.outputs.version }}
          body: |
            ## Kiro-Go Windows 安装包

            ### 下载说明
            - **Kiro-Go-Setup.exe**: Windows 安装程序

            ### 功能
            - 双击安装程序进行安装
            - 自动创建桌面快捷方式
            - 自动创建开始菜单快捷方式
            - 支持卸载功能

            ### 使用方法
            1. 下载并运行 `Kiro-Go-Setup.exe`
            2. 按照安装向导完成安装
            3. 双击桌面快捷方式或开始菜单启动
          draft: false
          prerelease: false
          files: installer/Kiro-Go-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
